name: Tests

on:
  push:
    branches: [ main ]
  pull_request: ~

  # Allow job to be triggered manually.
  workflow_dispatch:

  # Run job each night.
  schedule:
    - cron: '0 4 * * *'

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-22.04", "macos-15-intel" ] # , windows-latest ]
        ruby-version: [
          "2.0",
          "3.4",
          "4.0",
          "head",
        ]
        exclude:
          - os: "ubuntu-22.04"
            ruby-version: "2.0"

    name: Ruby ${{ matrix.ruby-version }} on OS ${{ matrix.os }}
    steps:

      - name: Acquire sources
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}

      - name: Caching of CrateDB
        uses: actions/cache@v5
        id: cache-cratedb
        with:
          path: parts
          key: cratedb-os=${{ matrix.os }}-${{ hashFiles('spec/bootstrap.rb') }}

      - name: Caching of Ruby gems
        uses: actions/cache@v5
        id: cache-gems
        with:
          path: vendor/bundle
          key: gems-os=${{ matrix.os }}-ruby=${{ matrix.ruby-version }}-${{ hashFiles('**/*.gemspec') }}

      - name: Bundle install
        run: |
          bundle config path vendor/bundle
          bundle install

      - name: Install CrateDB
        if: steps.cache-cratedb.outputs.cache-hit != 'true'
        run: bundle exec ruby spec/bootstrap.rb

      - name: Run tests
        run: bundle exec rspec

      - name: Run rubocop
        # rubocop 1.39 does not work on Ruby up to 2.5.
        if: ${{ matrix.ruby-version != '2.0' }}
        run: bundle exec rubocop
